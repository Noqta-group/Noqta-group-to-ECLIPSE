<section class="hero-logo-section" id="hero">
        <img src="https://ik.imagekit.io/aqdurahgv/image-removebg-preview%20(7).png" alt="Eclipse Logo" class="hero-logo-img">
    </section>

    <section class="standalone-media-section" id="slide5">
        <div class="media-wrapper">
            <video autoplay loop playsinline class="standalone-video">
                <source src="https://ik.imagekit.io/aqdurahgv/Final%20.mp4" type="video/mp4">
            </video>
        </div>
    </section>

    <audio id="bg-music" loop>
        <source src="https://ik.imagekit.io/aqdurahgv/mystic-downtempo-psychedelic-ambient-trip-hop-resonanz-resonanz-beats_Xh211MDc%20(1).mp3" type="audio/mpeg">
    </audio>
    
    <button id="audio-toggle" class="audio-btn">
        <span id="audio-icon">🔊</span>
    </button>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const audioToggle = document.getElementById('audio-toggle');
        const audioIcon = document.getElementById('audio-icon');
        let isMusicPlaying = false;

        // Browsers block autoplaying audio until the user interacts with the page.
        // This attempts to play it, and if blocked, sets the button to muted state so the user can click it.
        const playPromise = bgMusic.play();
        
        if (playPromise !== undefined) {
            playPromise.then(_ => {
                isMusicPlaying = true;
                audioIcon.textContent = '🔊';
            }).catch(error => {
                // Autoplay prevented by browser
                isMusicPlaying = false;
                audioIcon.textContent = '🔇';
            });
        }

        audioToggle.addEventListener('click', () => {
            if (isMusicPlaying) {
                bgMusic.pause();
                audioIcon.textContent = '🔇';
            } else {
                bgMusic.play();
                audioIcon.textContent = '🔊';
            }
            isMusicPlaying = !isMusicPlaying;
        });
    </script>
</body>
